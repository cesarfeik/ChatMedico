<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLADIEX Expediente — Acceso Médico</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/config.js"></script>
  <link rel="stylesheet" href="../css/app.css" />
</head>

<body class="login-page">
  <div class="login-bg"></div>

  <div class="login-wrapper">
    <div class="login-card">
      <div class="login-card-header">
        <div class="login-card-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" width="30"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.29 1.51 4.04 3 5.5l7 7Z"/></svg>
        </div>
        <div class="login-card-title">Portal Médico</div>
        <div class="login-card-subtitle">Consulta los expedientes de tus pacientes</div>
      </div>

      <div class="login-card-body">
        <div class="alert alert-error" id="error-msg" style="display:none"></div>
        <form id="login-form">
          <div class="field-group">
            <label class="field-label">Correo electrónico</label>
            <div class="field-icon-wrap">
              <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17"><rect x="2" y="4" width="20" height="16" rx="3"/><path d="m22 7-10 7L2 7"/></svg></span>
              <input type="email" id="email" class="field-input" placeholder="doctor@pladiex.com" required autocomplete="email" />
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Contraseña</label>
            <div class="field-icon-wrap password-wrapper">
              <span class="field-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="17"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
              <input type="password" id="password" class="field-input" placeholder="••••••••" required autocomplete="current-password" />
            </div>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">
            <span id="btn-text">Iniciar sesión</span>
            <span id="spinner" class="spinner" style="display:none"></span>
          </button>
        </form>
      </div>
    </div>
    <p class="login-note">Acceso restringido a personal médico autorizado.</p>
  </div>

  <script>
    const sb = supabase.createClient(window.SUPA.URL, window.SUPA.ANON);
    const $ = id => document.getElementById(id);

    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    $('login-form').addEventListener('submit', async e => {
      e.preventDefault();
      $('btn-text').style.display = 'none'; $('spinner').style.display = 'inline-block'; $('login-btn').disabled = true;
      const { data, error } = await sb.auth.signInWithPassword({ email: $('email').value.trim(), password: $('password').value });
      if (error) {
        $('btn-text').style.display = 'inline'; $('spinner').style.display = 'none'; $('login-btn').disabled = false;
        $('error-msg').textContent = 'Credenciales incorrectas.'; $('error-msg').style.display = 'block';
        return;
      }
      // Verificar que sea doctor
      const { data: doc } = await sb.from('doctors').select('user_id').eq('user_id', data.user.id).maybeSingle();
      if (!doc) {
        await sb.auth.signOut();
        $('btn-text').style.display = 'inline'; $('spinner').style.display = 'none'; $('login-btn').disabled = false;
        $('error-msg').textContent = 'Esta cuenta no está registrada como médico.'; $('error-msg').style.display = 'block';
        return;
      }
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
